constants:
  api:
    prefix: /api/user
  enum:
    scan-package: com.green.eats.common.model

# server.port 8080으로 통일
server:
  port: 8080

spring:
  config:
    import:
      - optional:classpath:application-common.yaml
      - optional:classpath:application-auth-prod.yaml
      - optional:classpath:application-jpa-prod.yaml
      - optional:classpath:application-redis-prod.yaml
  application:
    name: auth-service
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://112.222.157.157:5011/my_eats_user?useInformationSchema=true&createDatabaseIfNotExist=true&characterEncoding=UTF-8
    username: root
    password: test
  jpa:
    hibernate:
      ddl-auto: none
  kafka:
    # 서비스명(kafka) + 네임스페이스(infra) + 포트(9092)
    bootstrap-servers: kafka.infra.svc.cluster.local:9092
    producer:
      # 메시지의 키(Key)는 문자열로 보냅니다.
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      # 메시지의 값(Value)은 객체를 JSON으로 변환하여 보냅니다.
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all                  # 모든 replica 확인 후 ack
      retries: 3
      properties:
        enable.idempotence: true  # 중복 발행 방지
        max.in.flight.requests.per.connection: 5
